<section id="signinup" class="py-5">
   <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-sm">
              <div class="card-body">
                <h2 class="text-center">Sign up</h2>
                

                <form>
                  <div class="mb-3">
                    <label for="name" class="form-label">First Name</label>
                    <input id="name" class="form-control" type="text" placeholder="Your name" />
                  </div>

                  <div class="mb-3">
                    <label for="name" class="form-label">Last Name</label>
                    <input id="name" class="form-control" type="text" placeholder="Your name" />
                  </div>

                  <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input id="email" class="form-control" type="email" placeholder="you@example.com" />
                  </div>

                  <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input id="password" class="form-control" type="password" placeholder="Your password" />
                  </div>

                  <button class="btn btn-success w-100" type="submit">Submit</button>
